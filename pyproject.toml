[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "deepcell-types"
version = "0.1.0"
authors = [
    { name="Xuefei (Julie) Wang", email="xwang3@caltech.edu" },
]
description = "A generalized cell phenotyping model for spatial proteomics"
readme = "README.md"
requires-python = "~=3.10"
dependencies = [
    "requests",
    "pyyaml",
    "numpy",
    "numcodecs",
    "scipy",
    "scikit-image",
    "tqdm",
    "torch",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]

license = {file = "LICENSE"}

[project.optional-dependencies]
# Training pipeline: required to use anything under deepcell_types.training,
# including the zarr-backed FullImageDataset, FocalLoss/HierarchicalLoss,
# wandb logging, and the FOV-grouped sampler. Not needed for inference.
# zarr is pinned >=3.1 because 3.0.0a* alpha has a metadata-cache bug.
train = [
    "matplotlib",
    "wandb",
    "zarr>=3.1.0,<4",
    "torchvision",
    "torchinfo",
    "torchmetrics",
    "pandas",
    "scikit-learn",
    "click",
    # Used by scripts/ingest_gold_to_zarr.py (top-level import) and
    # by several other gold-standard / refinement scripts.
    "tifffile",
]
# Baselines comparison (xgboost / optuna sweeps).
baselines = ["xgboost", "optuna"]
# Plotting / analysis stack used by scripts under analysis/.
analysis = ["plotly", "seaborn", "openpyxl", "kaleido>=0.2.1,<1.0,!=0.2.1.post1"]
all = ["deepcell-types[train,baselines,analysis]"]

[project.urls]
"Source Code" = "https://github.com/vanvalenlab/deepcell-types"
"Issue Tracker" = "https://github.com/vanvalenlab/deepcell-types/issues"

[tool.setuptools]
packages = [
    'deepcell_types',
    'deepcell_types.dct_kit',
    'deepcell_types.training',
    'deepcell_types.utils'
]
include-package-data = true

[tool.setuptools.package-data]
deepcell_types = [
    "dct_kit/config/*.yaml",
    "dct_kit/config/*.json",
    # Training-side YAMLs (e.g. combined_celltypes.yaml used by
    # TissueNetConfig.combined_celltype_mapping) — must ship with
    # the wheel since training/config.py resolves them relative to
    # __file__, not via repo-root paths.
    "training/config/*.yaml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest",
    "ruff",
]
